default_install_hook_types:
  - pre-commit
  - post-checkout
  - post-merge
  - post-rewrite

repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit, pre-push]

      - id: check-added-large-files
        stages: [pre-commit, pre-push]

      - id: check-case-conflict
        stages: [pre-commit, pre-push]

      - id: end-of-file-fixer
        stages: [pre-commit, pre-push]

      - id: fix-byte-order-marker
        stages: [pre-commit, pre-push]

      - id: check-toml
        stages: [pre-commit, pre-push]

      - id: check-yaml
        stages: [pre-commit, pre-push]

      - id: mixed-line-ending
        stages: [pre-commit, pre-push]

      - id: check-symlinks
        stages: [pre-commit, pre-push]

      - id: check-merge-conflict
        stages: [pre-commit, pre-push]

      - id: detect-private-key
        stages: [pre-commit, pre-push]

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.2
    hooks:
      - id: uv-lock
        name: uv lock

      - id: uv-lock
        name: uv lock bench
        args: [--project, bench]

      - id: uv-sync
        name: uv sync

      - id: uv-sync
        name: uv sync bench
        args: [--project, bench]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-format
        name: ruff format
        stages: [pre-commit, pre-push]

      - id: ruff-check
        name: ruff check
        stages: [pre-commit, pre-push]
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.2
    hooks:
      - id: clang-format
        types_or: [c]
        stages: [pre-commit, pre-push]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.0
    hooks:
      - id: markdownlint-cli2
        name: markdownlint
        stages: [pre-commit, pre-push]

  - repo: local
    hooks:
      - id: commit-body
        name: commit body blank line
        stages: [commit-msg]
        language: system
        entry: |
          uv run --no-project --python 3.14 python -c "
            from sys import argv
            lines = [line for line in open(argv[1]) if not line.startswith('#')]
            exit('line 2 must be blank' if len(lines) > 1 and lines[1].strip() else 0)
          "

      - id: cargo-lock
        name: update cargo lockfiles
        stages: [manual]
        language: system
        files: ^Cargo\.toml$
        entry: cargo update --manifest-path

      - id: cargo-lock-bench
        name: update bench cargo lockfiles
        stages: [manual]
        language: system
        files: ^bench/Cargo\.toml$
        entry: cargo update --manifest-path

      - id: cargo-lock-tests
        name: update tests cargo lockfiles
        stages: [manual]
        language: system
        files: ^tests/Cargo\.toml$
        entry: cargo update --manifest-path

      - id: cargo-lock-perf
        name: update perf cargo lockfiles
        stages: [manual]
        language: system
        files: ^perf/Cargo\.toml$
        entry: cargo update --manifest-path

      - id: pytest
        name: pytest
        stages: [pre-push]
        language: system
        files: ^(python/|test/).*\.py$|^pyproject\.toml$
        pass_filenames: false
        entry: uv run pytest
        env:
          UV_LOCKED: "1"
          PYTHONDONTWRITEBYTECODE: "1"

      - id: cargo
        name: cargo test
        stages: [pre-push]
        language: system
        files: ^(src/|tests/).*\.rs$|^Cargo\.(toml|lock)$|^build\.rs$
        pass_filenames: false
        entry: >-
          sh -c "
            PATH=$(echo $PATH | tr ':' '\n' | grep -v '.venv' | tr '\n' ':')
            cargo test --locked --manifest-path tests/Cargo.toml
          "

      - id: rustfmt
        name: rustfmt
        stages: [pre-commit, pre-push]
        language: system
        files: ^src/.*\.rs$|^build\.rs$
        pass_filenames: false
        entry: cargo fmt --all

      - id: rustfmt-bench
        name: rustfmt (bench)
        stages: [pre-commit, pre-push]
        language: system
        files: ^bench/.*\.rs$
        pass_filenames: false
        entry: cargo fmt --all --manifest-path bench/Cargo.toml

      - id: rustfmt-tests
        name: rustfmt (tests)
        stages: [pre-commit, pre-push]
        language: system
        files: ^tests/.*\.rs$
        pass_filenames: false
        entry: cargo fmt --all --manifest-path tests/Cargo.toml

      - id: rustfmt-perf
        name: rustfmt (perf)
        stages: [pre-commit, pre-push]
        language: system
        files: ^perf/.*\.rs$
        pass_filenames: false
        entry: cargo fmt --all --manifest-path perf/Cargo.toml

      - id: clippy
        name: clippy
        stages: [pre-commit, pre-push]
        language: system
        files: ^src/.*\.rs$|^build\.rs$
        pass_filenames: false
        entry: cargo clippy --locked --fix --allow-dirty

      - id: clippy-bench
        name: clippy (bench)
        stages: [pre-commit, pre-push]
        language: system
        files: ^bench/.*\.rs$|^bench/Cargo\.toml$
        pass_filenames: false
        entry: cargo clippy --locked --fix --allow-dirty --manifest-path bench/Cargo.toml

      - id: clippy-tests
        name: clippy (tests)
        stages: [pre-commit, pre-push]
        language: system
        files: ^tests/.*\.rs$|^tests/Cargo\.toml$
        pass_filenames: false
        entry: cargo clippy --locked --fix --allow-dirty --manifest-path tests/Cargo.toml --tests

      - id: clippy-perf
        name: clippy (perf)
        stages: [pre-commit, pre-push]
        language: system
        files: ^perf/.*\.rs$|^perf/Cargo\.toml$
        pass_filenames: false
        entry: cargo clippy --locked --fix --allow-dirty --manifest-path perf/Cargo.toml --benches

      - id: ty
        name: ty
        stages: [pre-commit, pre-push]
        language: system
        files: ^(python/|test/).*\.py$|^pyproject\.toml$
        pass_filenames: false
        entry: uv run ty check
        env:
          UV_LOCKED: "1"

      - id: ty-bench
        name: ty (bench)
        stages: [pre-commit, pre-push]
        language: system
        files: ^bench/.*\.py$|^bench/pyproject\.toml$
        pass_filenames: false
        entry: uv run --project bench ty check
        env:
          UV_LOCKED: "1"

      - id: taplo-fmt
        name: taplo fmt
        stages: [pre-commit, pre-push]
        language: system
        types: [toml]
        entry: uv run taplo fmt
        env:
          UV_LOCKED: "1"

      - id: taplo-lint
        name: taplo lint
        stages: [pre-commit, pre-push]
        language: system
        types: [toml]
        entry: uv run taplo lint
        env:
          UV_LOCKED: "1"
