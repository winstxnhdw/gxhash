repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: check-case-conflict
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: check-toml
      - id: check-yaml
      - id: mixed-line-ending
      - id: check-symlinks
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: [--fix]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.21.0
    hooks:
      - id: markdownlint-cli2

  - repo: local
    hooks:
      - id: commit-body
        name: commit body blank line
        language: system
        stages: [commit-msg]
        entry: |
          uv run --no-project --python 3.14 python -c "
            from sys import argv
            lines = [line for line in open(argv[1]) if not line.startswith('#')]
            exit('line 2 must be blank' if len(lines) > 1 and lines[1].strip() else 0)
          "

      - id: cargo-lock
        name: update cargo lockfiles
        language: system
        stages: [manual]
        files: ^Cargo\.toml$
        entry: cargo update --manifest-path

      - id: cargo-lock-bench
        name: update bench cargo lockfiles
        language: system
        stages: [manual]
        files: ^bench/Cargo\.toml$
        entry: cargo update --manifest-path

      - id: cargo-lock-tests
        name: update tests cargo lockfiles
        language: system
        stages: [manual]
        files: ^tests/Cargo\.toml$
        entry: cargo update --manifest-path

      - id: cargo-lock-perf
        name: update perf cargo lockfiles
        language: system
        stages: [manual]
        files: ^perf/Cargo\.toml$
        entry: cargo update --manifest-path

      - id: uv-lock
        name: update uv lockfiles
        language: system
        stages: [manual]
        files: ^pyproject\.toml$
        pass_filenames: false
        entry: uv lock

      - id: uv-lock-bench
        name: update bench uv lockfiles
        language: system
        stages: [manual]
        files: ^bench/pyproject\.toml$
        pass_filenames: false
        entry: uv lock --directory bench

      - id: pytest
        name: pytest
        language: system
        stages: [pre-push]
        files: ^(python/|test/).*\.py$|^pyproject\.toml$
        pass_filenames: false
        entry: uv run pytest
        env:
          UV_LOCKED: "1"
          PYTHONDONTWRITEBYTECODE: "1"

      - id: cargo
        name: cargo test
        language: system
        stages: [pre-push]
        files: ^(src/|tests/).*\.rs$|^Cargo\.(toml|lock)$|^build\.rs$
        pass_filenames: false
        entry: >-
          sh -c "
            PATH=$(echo $PATH | tr ':' '\n' | grep -v '.venv' | tr '\n' ':')
            cargo test --manifest-path tests/Cargo.toml
          "

      - id: rustfmt
        name: rustfmt
        language: system
        files: ^src/.*\.rs$|^build\.rs$
        pass_filenames: false
        entry: cargo fmt --all

      - id: rustfmt-bench
        name: rustfmt (bench)
        language: system
        files: ^bench/.*\.rs$
        pass_filenames: false
        entry: cargo fmt --all --manifest-path bench/Cargo.toml

      - id: rustfmt-tests
        name: rustfmt (tests)
        language: system
        files: ^tests/.*\.rs$
        pass_filenames: false
        entry: cargo fmt --all --manifest-path tests/Cargo.toml

      - id: rustfmt-perf
        name: rustfmt (perf)
        language: system
        files: ^perf/.*\.rs$
        pass_filenames: false
        entry: cargo fmt --all --manifest-path perf/Cargo.toml

      - id: clippy
        name: clippy
        language: system
        files: ^src/.*\.rs$|^build\.rs$
        pass_filenames: false
        entry: cargo clippy --locked --fix --allow-dirty

      - id: clippy-bench
        name: clippy (bench)
        language: system
        files: ^bench/.*\.rs$|^bench/Cargo\.toml$
        pass_filenames: false
        entry: cargo clippy --locked --fix --allow-dirty --manifest-path bench/Cargo.toml

      - id: clippy-tests
        name: clippy (tests)
        language: system
        files: ^tests/.*\.rs$|^tests/Cargo\.toml$
        pass_filenames: false
        entry: cargo clippy --locked --fix --allow-dirty --manifest-path tests/Cargo.toml --tests

      - id: clippy-perf
        name: clippy (perf)
        language: system
        files: ^perf/.*\.rs$|^perf/Cargo\.toml$
        pass_filenames: false
        entry: cargo clippy --locked --fix --allow-dirty --manifest-path perf/Cargo.toml --benches

      - id: pyright
        name: pyright
        language: system
        files: ^(python/|test/).*\.py$|^pyproject\.toml$
        exclude: ^bench/
        pass_filenames: false
        entry: uv run pyright
        env:
          UV_LOCKED: "1"

      - id: pyright-bench
        name: pyright (bench)
        language: system
        files: ^bench/.*\.py$|^bench/pyproject\.toml$
        pass_filenames: false
        entry: uv run --directory bench pyright
        env:
          UV_LOCKED: "1"

      - id: taplo-fmt
        name: taplo fmt
        language: system
        types: [toml]
        entry: uv run taplo fmt
        env:
          UV_LOCKED: "1"

      - id: taplo-lint
        name: taplo lint
        language: system
        types: [toml]
        entry: uv run taplo lint
        env:
          UV_LOCKED: "1"
