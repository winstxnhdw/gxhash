name: Performance

on:
  pull_request:
  push:
    branches: ["**"]
    paths:
      - .github/workflows/performance.yml
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - src/**
      - perf/**
      - "!bench/**"

permissions: {}
env:
  RUSTFLAGS: -C target-feature=+aes,+ssse3
  BENCHMARK_PATH: perf

jobs:
  performance:
    if: ${{ !endsWith(github.actor, '[bot]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          show-progress: false
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: 3.14.3

      - name: Install cargo-codspeed
        uses: taiki-e/install-action@v2.69.9
        with:
          tool: cargo-codspeed

      - name: Build the benchmark target
        run: cargo codspeed build
        working-directory: ${{ env.BENCHMARK_PATH }}

      - name: Run the benchmark simulation
        uses: CodSpeedHQ/action@v4.12.1
        with:
          working-directory: ${{ env.BENCHMARK_PATH }}
          mode: simulation
          run: cargo codspeed run
