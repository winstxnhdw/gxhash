name: Publish

on:
  release:
    types: published

permissions: {}
env:
  UV_ISOLATED: 1
  PYTHONDONTWRITEBYTECODE: 1
  TAG_NAME: ${{ github.event.release.tag_name }}

jobs:
  compare:
    runs-on: ubuntu-slim
    outputs:
      added: ${{ steps.new-files.outputs.added }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          show-progress: false
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Download sdist from previous release
        run: pip download gxhash --pre -d /tmp/previous

      - name: Build sdist from current commit
        run: uv build --sdist -o /tmp/current

      - name: List previous sdist files
        run: tar -tf /tmp/previous/gxhash-*.tar.gz | sed 's|^[^/]*/||' | sort > previous.txt

      - name: List current sdist files
        run: tar -tf /tmp/current/gxhash-*.tar.gz | sed 's|^[^/]*/||' | sort > current.txt

      - name: Compare sdist files
        id: new-files
        run: echo "added=$(comm -13 previous.txt current.txt | tr '\n' ' ')" > $GITHUB_OUTPUT

  review:
    if: needs.compare.outputs.added
    needs: compare
    runs-on: ubuntu-slim
    environment: staging

    steps:
      - name: Review new files in sdist
        run: |
          echo "New files detected in sdist. Please review the changes."
          echo "Added files:"
          echo "${{ needs.compare.outputs.added }}" | tr ' ' '\n' | sed 's/^/- /'

  publish:
    if: ${{ !cancelled() && needs.compare.result == 'success' }}
    needs: [compare, review]
    runs-on: ubuntu-slim
    environment:
      name: pypi
      url: https://pypi.org/project/gxhash/${{ env.TAG_NAME }}/

    permissions:
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.TAG_NAME }}
          show-progress: false
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Build sdist
        run: uv build -v --sdist

      - name: Smoke test
        run: uv run -v --no-project --with dist/gxhash-*.tar.gz tests/test_smoke.py

      - name: Publish to PyPI
        run: uv publish

  undo:
    if: failure()
    needs: [compare, review, publish]
    runs-on: ubuntu-slim
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          show-progress: false
          fetch-depth: 0

      - name: Set Git config
        run: |
          git config user.email github-actions[bot]@users.noreply.github.com
          git config user.name github-actions[bot]

      - name: Undo commit
        run: |
          git revert --no-commit "$(git rev-list -n 1 "$TAG_NAME")"
          git commit -m "revert: release $TAG_NAME"
          git push

      - name: Undo release
        run: gh release delete "$TAG_NAME" -y --cleanup-tag
        env:
          GH_TOKEN: ${{ github.token }}
