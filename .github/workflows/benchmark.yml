name: Benchmark

on: workflow_dispatch

permissions: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_NO_DEV: 1
  UV_LOCKED: 1
  UV_NO_SYNC: 1
  UV_PROJECT: ${{ github.workspace }}/bench
  PYTHONDONTWRITEBYTECODE: 1
  PYTHONOPTIMIZE: 2
  PYTHONMALLOC: mimalloc

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          show-progress: false
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install Python dependenc(ies)
        run: uv sync

      - name: Generate benchmark results
        run: sudo -E nice -n -20 ionice -c 1 -n 0 $(which uv) run bench

      - name: Render charts
        run: cargo run --locked --manifest-path "$UV_PROJECT/Cargo.toml"

      - name: Generate benchmark results with VAES
        run: sudo -E nice -n -20 ionice -c 1 -n 0 $(which uv) run --reinstall bench
        env:
          MATURIN_PEP517_ARGS: --features hybrid

      - name: Render VAES charts
        run: cargo run --locked --manifest-path "$UV_PROJECT/Cargo.toml" -- vaes

      - name: Upload charts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: charts
          if-no-files-found: error
          path: |
            benchmarks.parquet
            *.svg

  push:
    needs: benchmark
    runs-on: ubuntu-slim
    permissions:
      contents: write

    steps:
      - name: Checkout wiki
        uses: actions/checkout@v6.0.2
        with:
          show-progress: false
          repository: ${{ github.repository }}.wiki

      - name: Download charts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: charts
          path: resources

      - name: Set Git config
        run: |
          git config user.email github-actions[bot]@users.noreply.github.com
          git config user.name github-actions[bot]

      - name: Commit changes
        run: |
          git add "*.svg"
          git commit -m "chore: update benchmarks"
          git pull --rebase
          git push
