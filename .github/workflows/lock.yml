name: Lock

on:
  pull_request:
    paths: [Cargo.toml, Cargo.lock]

permissions: {}
concurrency:
  group: update-lockfile-${{ github.ref }}
  cancel-in-progress: true

env:
  BRANCH: ${{ github.head_ref }}
  PATCH_NAME: lockfile.patch
  ARTIFACT_NAME: lockfile-patch

jobs:
  lock:
    if: github.actor_id == '29139614'
    runs-on: ubuntu-latest
    outputs:
      patched: ${{ steps.patch.outputs.patched }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          show-progress: false
          persist-credentials: false
          ref: ${{ env.BRANCH }}

      - name: Update gxhash-perf lockfile
        run: cargo update --manifest-path perf/Cargo.toml

      - name: Update gxhash-tests lockfile
        run: cargo update --manifest-path tests/Cargo.toml

      - name: Upload patch
        id: patch
        uses: winstxnhdw/actions/upload-patch@main

  push:
    if: needs.lock.outputs.patched
    needs: lock
    uses: winstxnhdw/actions/.github/workflows/format-push.yml@main
    with:
      message: "build: update `gxhash-perf` and `gxhash-tests` lockfiles"
    secrets:
      token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
    permissions:
      contents: write
