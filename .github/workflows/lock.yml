name: Lock

on:
  pull_request:
    paths: [Cargo.toml, Cargo.lock]

permissions: {}
concurrency:
  group: update-lockfile-${{ github.ref }}
  cancel-in-progress: true

env:
  BRANCH: ${{ github.head_ref }}
  PATCH_NAME: lockfile.patch
  ARTIFACT_NAME: lockfile-patch

jobs:
  lock:
    if: github.actor_id == '29139614'
    runs-on: ubuntu-latest
    outputs:
      patched: ${{ steps.patch.outputs.patched }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          show-progress: false
          persist-credentials: false
          ref: ${{ env.BRANCH }}

      - name: Update gxhash-perf lockfile
        run: cargo update --manifest-path perf/Cargo.toml

      - name: Update gxhash-tests lockfile
        run: cargo update --manifest-path tests/Cargo.toml

      - name: Create patch
        id: patch
        run: echo "patched=$(git diff | tee "$PATCH_NAME" | head -c1)" > "$GITHUB_OUTPUT"

      - name: Upload artifact
        if: steps.patch.outputs.patched
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.PATCH_NAME }}

  push:
    if: needs.lock.outputs.patched
    needs: lock
    runs-on: ubuntu-slim
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          show-progress: false
          ref: ${{ env.BRANCH }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Download artifact
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: ${{ env.ARTIFACT_NAME }}

      - name: Set Git config
        run: |
          git config user.email github-actions[bot]@users.noreply.github.com
          git config user.name github-actions[bot]

      - name: Commit changes
        run: |
          git apply "$PATCH_NAME" || true
          git commit -am "build: update perf lockfile" || true
          git pull --rebase origin "$BRANCH"
          git push origin "HEAD:$BRANCH"
